name: Backend PR Checks

on:
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-pr-checks.yml'

jobs:
  pr-validation:
    name: Validate PR
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      working-directory: ./backend
      run: npm ci

    - name: Check for console.logs
      working-directory: ./backend
      run: |
        echo "Checking for console.log statements..."
        if grep -r "console\.log" --include="*.js" --exclude-dir=node_modules --exclude-dir=coverage --exclude-dir=tests .; then
          echo "⚠️ Warning: console.log statements found. Consider using proper logging."
        else
          echo "✅ No console.log statements found"
        fi
      continue-on-error: true

    - name: Check for TODO comments
      working-directory: ./backend
      run: |
        echo "Checking for TODO comments..."
        if grep -r "TODO\|FIXME" --include="*.js" --exclude-dir=node_modules --exclude-dir=coverage .; then
          echo "⚠️ Warning: TODO/FIXME comments found"
        else
          echo "✅ No TODO/FIXME comments found"
        fi
      continue-on-error: true

    - name: Check package.json changes
      run: |
        if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "backend/package.json"; then
          echo "📦 package.json was modified"
          echo "Please ensure package-lock.json is also updated"
        fi

    - name: Run tests
      working-directory: ./backend
      run: npm test
      env:
        NODE_ENV: test
        ACCESS_TOKEN_SECRET: test_access_token_secret
        REFRESH_TOKEN_SECRET: test_refresh_token_secret

    - name: Comment PR
      uses: actions/github-script@v7
      if: always()
      with:
        script: |
          const output = `#### Backend PR Checks 🎯
          
          **Status**: ${{ job.status }}
          
          - ✅ Dependencies installed
          - ✅ Tests executed
          - ✅ Code validated
          
          *Automated checks completed for backend changes*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })

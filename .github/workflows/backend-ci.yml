name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'backend/**'
      - 'render.yaml'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'backend/**'
      - 'render.yaml'
      - '.github/workflows/backend-ci.yml'

env:
  NODE_VERSION: '20.x'
  IMAGE_NAME: yeneta-backend

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      working-directory: ./backend
      run: npm install

    - name: Run ESLint
      working-directory: ./backend
      run: npm run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      working-directory: ./backend
      run: npm install

    - name: Run tests with coverage
      working-directory: ./backend
      run: npm run test:coverage
      env:
        NODE_ENV: test
        ACCESS_TOKEN_SECRET: test_access_token_secret
        REFRESH_TOKEN_SECRET: test_refresh_token_secret

    - name: Upload coverage to Codecov
      if: matrix.node-version == '20.x'
      uses: codecov/codecov-action@v4
      with:
        files: ./backend/coverage/lcov.info
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Archive coverage report
      if: matrix.node-version == '20.x'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: backend/coverage/
        retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      working-directory: ./backend
      run: npm install

    - name: Run npm audit
      working-directory: ./backend
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high --file=backend/package.json

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        tags: ${{ env.IMAGE_NAME }}:ci
        load: true

    - name: Run container health check
      run: |
        docker run -d --name yeneta-backend-ci -p 5050:5000 \
          -e NODE_ENV=production \
          -e PORT=5000 \
          -e ACCESS_TOKEN_SECRET=ci_access_secret \
          -e REFRESH_TOKEN_SECRET=ci_refresh_secret \
          -e MONGO_URI=mongodb://127.0.0.1:27017/ci_skip \
          ${{ env.IMAGE_NAME }}:ci || true
        sleep 3
        docker logs yeneta-backend-ci || true
        docker rm -f yeneta-backend-ci || true
        echo "Docker image built successfully"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ secrets.STAGING_URL }}

    steps:
    - name: Deploy to Render Staging
      run: |
        if [ -z "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}" ]; then
          echo "RENDER_STAGING_DEPLOY_HOOK not configured — skipping deploy"
          exit 0
        fi
        echo "Deploying to staging..."
        curl -fsS -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"
        echo "Staging deployment triggered"

    - name: Wait for deployment
      run: sleep 60

    - name: Health check
      run: |
        if [ -z "${{ secrets.STAGING_URL }}" ]; then
          echo "STAGING_URL not configured — skipping health check"
          exit 0
        fi
        curl -fsS "${{ secrets.STAGING_URL }}/health"
        echo "Staging is healthy"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ secrets.PRODUCTION_URL }}

    steps:
    - name: Deploy to Render Production
      run: |
        if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
          echo "RENDER_DEPLOY_HOOK not configured — skipping deploy"
          exit 0
        fi
        echo "Deploying to production..."
        curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        echo "Production deployment triggered"

    - name: Wait for deployment
      run: sleep 90

    - name: Health check
      run: |
        if [ -z "${{ secrets.PRODUCTION_URL }}" ]; then
          echo "PRODUCTION_URL not configured — skipping health check"
          exit 0
        fi
        curl -fsS "${{ secrets.PRODUCTION_URL }}/health"
        echo "Production is healthy"

    - name: Notify deployment success
      if: success()
      run: echo "Production deployment successful — ${{ secrets.PRODUCTION_URL }}"

    - name: Notify deployment failure
      if: failure()
      run: echo "Production deployment failed — check Render logs"

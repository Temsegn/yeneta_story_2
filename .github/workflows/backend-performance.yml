name: Backend Performance Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  performance-test:
    name: Run Performance Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      working-directory: ./backend
      run: npm ci

    - name: Start server
      working-directory: ./backend
      run: |
        npm start &
        echo $! > server.pid
        sleep 10
      env:
        NODE_ENV: test
        PORT: 5000
        MONGO_URI: mongodb://localhost:27017/test_db
        ACCESS_TOKEN_SECRET: test_secret
        REFRESH_TOKEN_SECRET: test_secret

    - name: Run basic performance check
      run: |
        echo "🚀 Testing API response times..."
        
        # Health endpoint
        time curl -f http://localhost:5000/health
        
        echo "✅ Performance check complete"

    - name: Stop server
      if: always()
      working-directory: ./backend
      run: |
        if [ -f server.pid ]; then
          kill $(cat server.pid) || true
          rm server.pid
        fi

    - name: Generate performance report
      run: |
        echo "📊 Performance Report" > performance-report.txt
        echo "===================" >> performance-report.txt
        echo "Date: $(date)" >> performance-report.txt
        echo "Commit: ${{ github.sha }}" >> performance-report.txt
        echo "Branch: ${{ github.ref_name }}" >> performance-report.txt

    - name: Upload performance report
      uses: actions/upload-artifact@v4
      with:
        name: performance-report
        path: performance-report.txt
        retention-days: 30

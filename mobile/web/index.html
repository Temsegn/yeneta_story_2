<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="kids_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>kids_app</title>
  <link rel="manifest" href="manifest.json">
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 16%, rgba(250, 204, 21, 0.42) 0 9%, transparent 10%),
        radial-gradient(circle at 84% 80%, rgba(250, 204, 21, 0.30) 0 12%, transparent 13%),
        linear-gradient(145deg, #15803d 0%, #16a34a 50%, #22c55e 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .splash-shell {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 32px;
      box-sizing: border-box;
    }

    .splash-logo {
      width: min(64vw, 240px);
      aspect-ratio: 1;
      overflow: hidden;
      border: 6px solid #facc15;
      border-radius: 34%;
      background: #ffffff;
      box-shadow: 0 24px 55px rgba(5, 46, 22, 0.36);
      animation: splash-pop 700ms cubic-bezier(.2, .8, .2, 1) both;
    }

    .splash-logo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .splash-title {
      color: #ffffff;
      font-size: clamp(30px, 9vw, 44px);
      font-weight: 900;
      letter-spacing: -1px;
      text-shadow: 0 4px 14px rgba(5, 46, 22, 0.35);
    }

    .splash-tagline {
      margin-top: -14px;
      color: #fef9c3;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .splash-loader {
      width: min(58vw, 210px);
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.25);
    }

    .splash-loader::after {
      display: block;
      width: 44%;
      height: 100%;
      border-radius: inherit;
      background: #facc15;
      content: "";
      animation: splash-load 1.15s ease-in-out infinite alternate;
    }

    @keyframes splash-pop {
      from { opacity: 0; transform: scale(.82) translateY(12px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes splash-load {
      from { transform: translateX(-20%); }
      to { transform: translateX(150%); }
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <div id="splash" class="splash-shell" aria-hidden="true">
    <div class="splash-logo">
      <img src="splash/img/light-1x.png" alt="">
    </div>
    <div class="splash-title">Yeneta Story</div>
    <div class="splash-tagline">Learn • Read • Play</div>
    <div class="splash-loader"></div>
  </div>
  
  <script src="flutter_bootstrap.js" async=""></script>


</body></html>

services:
  - type: web
    name: yeneta-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ACCESS_TOKEN_EXPIRE
        value: 15m
      - key: REFRESH_TOKEN_EXPIRE
        value: 7d
      - key: CHAPA_SECRET_KEY
        sync: false
      - key: CHAPA_WEBHOOK_SECRET
        sync: false
    healthCheckPath: /health

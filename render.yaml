services:
  - type: web
    name: yeneta-backend
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: FRONTEND_URL
        value: https://yeneta-zq3w.onrender.com/api/v1/payments/chapa/return?status=success
      - key: CHAPA_RETURN_URL
        value: https://yeneta-zq3w.onrender.com/api/v1/payments/chapa/return?status=success
      - key: ACCESS_TOKEN_EXPIRE
        value: 15m
      - key: REFRESH_TOKEN_EXPIRE
        value: 7d
      - key: CHAPA_SECRET_KEY
        sync: false
      - key: CHAPA_WEBHOOK_SECRET
        sync: false
    healthCheckPath: /health
